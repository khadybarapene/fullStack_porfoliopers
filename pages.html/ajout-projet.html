<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajout Projet</title>

  <link rel="stylesheet" href="../pages.css/form.css">
  <link rel="stylesheet" href="../pages.css/ajout-projet.css">
</head>

<body>

  <!-- Retour accueil -->
  <div class="btn-back-index">
    <a href="index.html">🔙 Retour à l'accueil</a>
  </div>

  <!-- Menu -->
  <nav class="nav-menu">
    <a href="list-projet.html">Liste</a>
    <a href="ajout-projet.html">Ajouter</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- Titre -->
 <header>
  <img src="../liste-projet/logo.jpeg" alt="Logo" class="logo">
  <div class="header-text">
    <h1>Ajout d'un projet</h1>   <!-- ✅ en haut -->
  
  </div>
</header>

<main>
  <section>
    <h2>Formulaire de projet</h2>
      <form>

        <label>Nom du projet :</label>
        <input type="text" name="projectName" required>

        <label>Description du projet :</label>
        <textarea name="projectDescription" required></textarea>

        <label>Technologie 1 :</label>
        <input type="text" name="tech1">

        <label>Technologie 2 :</label>
        <input type="text" name="tech2">

        <label>Technologie 3 :</label>
        <input type="text" name="tech3">

        <label>Image du projet :</label>
        <input type="file" name="projectImage" accept="image/*">

        <button type="submit">Ajouter le projet</button>
        <button type="reset">Réinitialiser</button>

      </form>

    </section>
  </main>

  <!-- Footer -->
  <footer>
    © Khady PENE Fullstack Portfolio
  </footer>

</body>
</html>
