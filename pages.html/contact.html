<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../pages.css/form.css">
  <link rel="stylesheet" href="../pages.css/contact.css">
</head>

<body>

  <!-- Bouton retour accueil -->
  <div class="btn-back-index">
    <a href="index.html">🔙 Retour à l'accueil</a>
  </div>

  <!-- Menu de navigation -->
  <nav class="nav-menu">
    <a href="list-projet.html">Liste</a>
    <a href="ajout-projet.html">Ajouter</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- Titre principal -->
  <header>
    <h1>Contact</h1>
  </header>

  <!-- Contenu principal -->
  <main>
    <section class="content">

      <h2>Contactez-moi</h2>

      <!-- Formulaire -->
      <form id="contactForm">

        <label for="name">Nom :</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message :</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Envoyer</button>
        <button type="reset">Réinitialiser</button>

      </form>

    </section>
  </main>

  <!-- Pied de page -->
  <footer>
    <p>© Khady PENE Fullstack Portfolio</p>
  </footer>

</body>
</html>
